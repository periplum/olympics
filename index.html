<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Olympic Games Host Cities (1896–2032)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/gh/periplum/periplum-core@v0.3.3/dist/periplum.js" integrity="sha384-1JX16g07d5qE+6X/Yr9t0YQk/gP8Zhr3iRhsd8Rlpa5adN7HHeo6UTOxxz3NRmPk" crossorigin="anonymous"></script>
</head>
<body>
<script>
  Periplum.render({
    title: "Olympic Games Host Cities · 1896–2032",
    dataUrl: "data.json",
    repo: "https://github.com/periplum/olympics",
    favicon: "favicon.png",
    theme: { headerBg: "#0b3d6b", accent: "#f4c430" },
    routeLabel: "Host-city sequence",
    statusColors: { "Summer": "#ff7f0e", "Winter": "#4da3ff" },
    statusIcons: { "Summer": "☀️", "Winter": "❄️" },
    seo: {
      description: "Every Summer and Winter Olympic host city, 1896–2032, in chronological order — ☀️ for the Summer Games, ❄️ for the Winter Games. Built with Periplum."
    },
    basemaps: [
      { id: "earth", name: "🌍 Earth", type: "tiles",
        tileUrl: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        attribution: "&copy; OpenStreetMap contributors",
        minZoom: 2, initialView: [30, 10], initialZoom: 2 }
    ]
  });
</script>
</body>
</html>
